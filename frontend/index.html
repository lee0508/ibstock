<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IBStock Local Demo</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: rgba(255, 250, 242, 0.92);
      --line: #d4c6ae;
      --text: #1e2a31;
      --muted: #6b736f;
      --accent: #ad4e1a;
      --accent-2: #2c6b5a;
      --shadow: 0 18px 45px rgba(30, 42, 49, 0.09);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 233, 194, 0.75), transparent 28%),
        radial-gradient(circle at top right, rgba(182, 214, 198, 0.55), transparent 22%),
        linear-gradient(180deg, #fbf5ea 0%, var(--bg) 62%, #eadfcf 100%);
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    .hero {
      display: grid;
      gap: 18px;
      margin-bottom: 24px;
    }
    .hero-card,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }
    .hero-card {
      padding: 28px;
    }
    .eyebrow {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(173, 78, 26, 0.1);
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 13px;
    }
    h1 {
      margin: 14px 0 10px;
      font-size: clamp(30px, 6vw, 54px);
      line-height: 1.04;
    }
    p {
      margin: 0;
      line-height: 1.6;
    }
    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }
    .layout {
      display: grid;
      gap: 20px;
      grid-template-columns: 380px minmax(0, 1fr);
    }
    .panel {
      padding: 22px;
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }
    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }
    label {
      font-size: 14px;
      font-weight: 700;
    }
    input,
    select,
    textarea,
    button {
      font: inherit;
    }
    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      background: white;
      color: var(--text);
    }
    textarea {
      min-height: 132px;
      resize: vertical;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 700;
    }
    .primary {
      background: var(--accent);
      color: white;
    }
    .secondary {
      background: rgba(44, 107, 90, 0.12);
      color: var(--accent-2);
    }
    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(44, 107, 90, 0.08);
      color: var(--accent-2);
      font-size: 14px;
      white-space: pre-wrap;
    }
    .result-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }
    .cards {
      display: grid;
      gap: 14px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.74);
    }
    .card h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 12px 0;
    }
    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(173, 78, 26, 0.1);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }
    .answer-box {
      margin-bottom: 18px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(44, 107, 90, 0.1);
      border: 1px solid rgba(44, 107, 90, 0.2);
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="hero-card">
        <span class="eyebrow">Local Demo</span>
        <h1>IBStock RAG 시연 화면</h1>
        <p>로컬 노트북 기준으로 Shorts 기반 주식 검색과 질의 응답을 확인하는 초기 시연 페이지입니다. 현재 검색은 SQLite exact match + FAISS 하이브리드로 동작하고, Ollama가 실행 중이면 생성형 답변까지 붙습니다.</p>
        <div class="hero-meta">
          <span>API: <strong>/api/stock/search</strong></span>
          <span>Q&A: <strong>/api/stock/query</strong></span>
          <span>Index: <strong>/api/stock/index-info</strong></span>
        </div>
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <h2>검색 실행</h2>
        <div class="field">
          <label for="queryInput">질문 또는 키워드</label>
          <input id="queryInput" value="대한전선" placeholder="예: 대한전선, JP모건, 원자력">
        </div>
        <div class="field">
          <label for="limitInput">결과 개수</label>
          <select id="limitInput">
            <option value="3" selected>3개</option>
            <option value="5">5개</option>
            <option value="10">10개</option>
          </select>
        </div>
        <div class="actions">
          <button class="primary" id="searchBtn">검색</button>
          <button class="secondary" id="askBtn">질의 응답</button>
          <button class="secondary" id="healthBtn">상태 확인</button>
        </div>
        <div class="status" id="statusBox">대기 중</div>
      </div>

      <div class="panel">
        <div class="result-head">
          <h2>결과</h2>
          <span id="resultMeta">아직 실행되지 않음</span>
        </div>
        <div class="answer-box" id="answerBox" hidden></div>
        <div class="cards" id="resultCards"></div>
      </div>
    </section>
  </main>

  <script>
    const queryInput = document.getElementById('queryInput');
    const limitInput = document.getElementById('limitInput');
    const statusBox = document.getElementById('statusBox');
    const resultMeta = document.getElementById('resultMeta');
    const answerBox = document.getElementById('answerBox');
    const resultCards = document.getElementById('resultCards');

    function setStatus(text) {
      statusBox.textContent = text;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function renderCards(items) {
      if (!items.length) {
        resultCards.innerHTML = '<div class="card"><h3>결과 없음</h3><p>현재 조건과 직접 연결되는 결과가 없습니다.</p></div>';
        return;
      }

      resultCards.innerHTML = items.map((item) => {
        const chips = [
          ...(item.stocks || []).map(v => `<span class="chip">종목 ${escapeHtml(v)}</span>`),
          ...(item.ib_names || []).map(v => `<span class="chip">기관 ${escapeHtml(v)}</span>`),
          ...(item.sectors || []).map(v => `<span class="chip">섹터 ${escapeHtml(v)}</span>`),
        ].join('');

        const meta = [
          item.published_at ? `날짜 ${escapeHtml(item.published_at)}` : '',
          item.views ? `조회수 ${escapeHtml(item.views)}` : '',
          item.category ? `카테고리 ${escapeHtml(item.category)}` : '',
          typeof item.score === 'number' ? `점수 ${item.score.toFixed(3)}` : '',
        ].filter(Boolean).map(v => `<span>${v}</span>`).join('');

        return `
          <article class="card">
            <h3>${escapeHtml(item.title || '제목 없음')}</h3>
            <div class="meta">${meta}</div>
            <p>${escapeHtml(item.snippet || '')}</p>
            <div class="chips">${chips}</div>
            ${item.source_url ? `<a href="${escapeHtml(item.source_url)}" target="_blank" rel="noreferrer">원본 영상 열기</a>` : ''}
          </article>
        `;
      }).join('');
    }

    async function callApi(path, payload) {
      const response = await fetch(path, {
        method: payload ? 'POST' : 'GET',
        headers: payload ? { 'Content-Type': 'application/json' } : {},
        body: payload ? JSON.stringify(payload) : undefined,
      });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      return response.json();
    }

    async function runSearch(mode) {
      const query = queryInput.value.trim();
      const limit = Number(limitInput.value);
      if (!query) {
        setStatus('질문을 입력하세요.');
        return;
      }

      setStatus(`${mode === 'query' ? '질의 응답' : '검색'} 실행 중...`);
      answerBox.hidden = true;
      answerBox.textContent = '';

      try {
        const path = mode === 'query' ? '/api/stock/query' : '/api/stock/search';
        const data = await callApi(path, { query, limit, mode: 'keyword' });
        resultMeta.textContent = `${data.items.length}건 반환`;
        if (data.answer) {
          answerBox.hidden = false;
          answerBox.textContent = data.answer;
        }
        renderCards(data.items || []);
        setStatus(`${mode === 'query' ? '질의 응답' : '검색'} 완료`);
      } catch (error) {
        setStatus(`실패: ${error.message}`);
      }
    }

    document.getElementById('searchBtn').addEventListener('click', () => runSearch('search'));
    document.getElementById('askBtn').addEventListener('click', () => runSearch('query'));
    document.getElementById('healthBtn').addEventListener('click', async () => {
      setStatus('상태 확인 중...');
      try {
        const [health, index] = await Promise.all([
          callApi('/api/health'),
          callApi('/api/stock/index-info'),
        ]);
        setStatus(JSON.stringify({ health, index }, null, 2));
      } catch (error) {
        setStatus(`상태 확인 실패: ${error.message}`);
      }
    });
  </script>
</body>
</html>
